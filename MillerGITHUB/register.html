<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafia Рейтинг - Регистрация</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Скопируйте сюда все стили из login.html, они уже есть */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: #ffd700;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .login-header i {
            font-size: 3em;
            color: #ffd700;
            margin-bottom: 20px;
        }
        .login-header p {
            color: rgba(255,255,255,0.7);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.9);
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            color: white;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(255,255,255,0.15);
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .error-message {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .register-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border: none;
            border-radius: 15px;
            color: #1a1a2e;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,215,0,0.3);
        }
        .register-btn i {
            margin-right: 10px;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #ffd700;
        }
        .loading.show {
            display: block;
        }
        .loading i {
            margin-right: 5px;
        }
        .info-message {
            margin-top: 25px;
            padding: 15px 20px;
            background: rgba(52, 152, 219, 0.1);
            border: 1px solid rgba(52, 152, 219, 0.3);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #3498db;
            font-size: 0.95em;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.5s ease;
        }
        .info-message i {
            font-size: 1.2em;
            color: #3498db;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
        }
        .login-link a {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(10px); }
            to { opacity:1; transform:translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-user-plus"></i>
            <h1>Регистрация</h1>
            <p>Создайте аккаунт гостя</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="registerForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Логин *</label>
                <input type="text" id="username" placeholder="Введите логин" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Пароль *</label>
                <input type="password" id="password" placeholder="Введите пароль" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email (необязательно)</label>
                <input type="email" id="email" placeholder="example@mail.com">
            </div>

            <button type="submit" class="register-btn">
                <i class="fas fa-check-circle"></i> Зарегистрироваться
            </button>
        </form>

        <div class="loading" id="loading">
            <i class="fas fa-spinner fa-spin"></i> Регистрация...
        </div>

        <div class="info-message">
            <i class="fas fa-info-circle"></i>
            <span>Вы получите роль "Гость". Для получения роли "Игрок" обратитесь к администратору.</span>
        </div>

        <div class="login-link">
            Уже есть аккаунт? <a href="login.html">Войти</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value.trim() || null;
            const errorDiv = document.getElementById('errorMessage');
            const loadingDiv = document.getElementById('loading');
            
            if (!username || !password) {
                errorDiv.textContent = 'Заполните все обязательные поля';
                errorDiv.classList.add('show');
                return;
            }
            
            loadingDiv.classList.add('show');
            errorDiv.classList.remove('show');
            
            try {
                const response = await fetch('auth_api.php?action=register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Перенаправляем на страницу входа с сообщением
                    localStorage.setItem('registrationSuccess', 'true');
                    window.location.href = 'login.html';
                } else {
                    errorDiv.textContent = data.error || 'Ошибка регистрации';
                    errorDiv.classList.add('show');
                }
            } catch (error) {
                errorDiv.textContent = 'Ошибка соединения с сервером';
                errorDiv.classList.add('show');
            } finally {
                loadingDiv.classList.remove('show');
            }
        });
    </script>
</body>
</html>
